name: Generate Profile Summary Cards

on:
schedule:
- cron: "0 0 * * *"

workflow_dispatch:

push:
branches:
- main

jobs:
generate:
runs-on: ubuntu-latest

```
permissions:
  contents: write

steps:
  - uses: actions/checkout@v4

  - name: Generate profile summary cards
    uses: vn7n24fzkq/github-profile-summary-cards@release
    env:
      GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
    with:
      USERNAME: BrandowLucas
      BRANCH_NAME: main
      UTC_OFFSET: -3
      AUTO_PUSH: true
